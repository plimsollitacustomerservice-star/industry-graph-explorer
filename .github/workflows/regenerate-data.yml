name: Regenerate Industry Data

# Triggers when you upload/update the Excel master file in the repo root
on:
  push:
    paths:
      - '*.xls'
      - '*.xlsx'
      - 'scripts/enrich_from_definitions.py'
  workflow_dispatch:   # also allows manual trigger from the Actions tab

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the regenerated JSON files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl xlrd pandas

      - name: Run enrich_from_definitions.py
        run: python scripts/enrich_from_definitions.py

      - name: Commit regenerated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to data files — nothing to commit."
          else
            git commit -m "data: auto-regenerate JSON chunks from Excel [skip ci]"
            git push
          fi
