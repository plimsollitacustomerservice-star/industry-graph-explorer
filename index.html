<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Industry Graph Explorer – Plimsoll Italia</title>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; }

    /* ── Top bar ── */
    #topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: #1a2e4a; color: #fff;
      position: relative; z-index: 100;
    }
    #topbar h1 { font-size: 16px; margin: 0; white-space: nowrap; }
    #searchWrap { position: relative; flex: 1; max-width: 420px; }
    #searchBox {
      width: 100%; padding: 7px 12px;
      border: none; border-radius: 4px; font-size: 14px;
    }
    #results {
      display: none;
      position: absolute; top: 34px; left: 0; width: 100%;
      background: #fff; border: 1px solid #ccc;
      border-radius: 0 0 4px 4px;
      max-height: 260px; overflow-y: auto;
      z-index: 200; box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    #results div { padding: 8px 12px; cursor: pointer; font-size: 13px; color: #222; border-bottom: 1px solid #f0f0f0; }
    #results div:hover { background: #e8f0fe; }
    #results .res-code { font-weight: bold; color: #1a2e4a; }
    #results .res-name { color: #555; }

    /* ── Filters bar ── */
    #filterbar {
      display: flex; gap: 10px; align-items: center;
      padding: 6px 16px;
      background: #253d5e; color: #cfd8e3; font-size: 13px;
    }
    #filterbar label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    #filterbar select {
      padding: 3px 6px; border-radius: 3px;
      border: 1px solid #4a6480;
      background: #1a2e4a; color: #fff; font-size: 13px;
    }

    /* ── Main area ── */
    #main { display: flex; height: calc(100vh - 88px); }

    /* ── Side panel ── */
    #sidebar {
      width: 320px; min-width: 240px;
      background: #fff; border-right: 1px solid #dde;
      padding: 14px 12px; overflow-y: auto; font-size: 13px;
    }
    #sidebar h2 { font-size: 14px; margin: 0 0 10px; color: #1a2e4a; }

    /* ── Detail rows ── */
    #infoBox { color: #333; line-height: 1.6; }

    .d-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .d-repcode { font-size: 11px; font-weight: 700; background: #1a2e4a; color: #a0c4ff; padding: 2px 8px; border-radius: 10px; }
    .d-title { font-size: 15px; font-weight: 700; color: #1a2e4a; margin: 4px 0 2px; line-height: 1.4; }
    .d-native { font-size: 12px; color: #888; font-style: italic; margin-bottom: 8px; }
    .sector-pill {
      display: inline-block; padding: 3px 10px;
      border-radius: 12px; font-size: 11px; font-weight: 700;
      margin-bottom: 12px; letter-spacing: 0.03em;
    }

    .d-section {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #1a2e4a;
      border-top: 2px solid #e8ecf5;
      margin: 14px 0 8px; padding-top: 8px;
    }
    .d-row { display: flex; gap: 6px; margin-bottom: 7px; align-items: flex-start; }
    .d-label {
      flex: 0 0 110px; font-size: 11px; font-weight: 600;
      color: #666; padding-top: 1px; line-height: 1.5;
    }
    .d-val { flex: 1; font-size: 12px; color: #222; line-height: 1.6; word-break: break-word; }
    .empty-val { color: #bbb; }

    /* ATECO chips */
    .ateco-chip {
      display: inline-block;
      background: #eef2ff; border: 1px solid #c0ccff;
      border-radius: 4px; padding: 1px 6px;
      font-size: 11px; font-family: monospace;
      color: #1a2e4a; margin: 1px 2px 1px 0;
    }

    /* Keyword tags */
    .kw-tag {
      display: inline-block;
      background: #f0f8f0; border: 1px solid #b2d8b2;
      border-radius: 10px; padding: 1px 7px;
      font-size: 11px; color: #2d6a2d; margin: 1px 2px 1px 0;
    }

    /* Orbis Boolean code box */
    .orbis-box {
      background: #1a1a2e; color: #7ee8a2;
      font-family: monospace; font-size: 11px;
      padding: 8px 10px; border-radius: 6px;
      white-space: pre-wrap; word-break: break-all;
      line-height: 1.6;
    }

    /* Collapsible */
    .collapsible-wrap { position: relative; }
    .ctext.collapsed {
      max-height: 58px; overflow: hidden;
      -webkit-mask-image: linear-gradient(180deg,#000 55%,transparent);
      mask-image: linear-gradient(180deg,#000 55%,transparent);
    }
    .ctext.expanded { max-height: none; }
    .toggle-btn {
      display: inline-block; margin-top: 3px;
      font-size: 11px; color: #3a86ff;
      cursor: pointer; font-weight: 600; user-select: none;
    }
    .toggle-btn:hover { text-decoration: underline; }

    /* Priority badges */
    .priority-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
    .priority-high { background:#fde8e8; color:#c0392b; border:1px solid #f5b7b1; }
    .priority-med  { background:#fef9e7; color:#b7950b; border:1px solid #f9e79f; }
    .priority-low  { background:#eafaf1; color:#1e8449; border:1px solid #a9dfbf; }

    /* Sector badge (inline) */
    .sector-badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 10px; font-size: 11px; font-weight: 700;
    }

    /* Neighbors */
    #infoBox .neighbors { margin-top: 4px; }
    #infoBox .neighbors strong { font-size: 11px; display: block; margin-bottom: 4px; color: #555; }
    #infoBox .neighbor-item {
      padding: 5px 8px; margin: 3px 0;
      background: #f5f7ff; border-radius: 3px;
      cursor: pointer; border-left: 3px solid #1a2e4a;
      font-size: 12px;
    }
    #infoBox .neighbor-item:hover { background: #e8f0fe; }
    #infoBox .tag {
      display: inline-block; padding: 2px 7px;
      border-radius: 10px; font-size: 11px; font-weight: bold; margin-right: 4px;
    }
    .dir-downstream { background: #d4edda; color: #155724; }
    .dir-upstream   { background: #fff3cd; color: #856404; }
    .dir-peer       { background: #d1ecf1; color: #0c5460; }
    .no-links { color: #aaa; font-size: 12px; font-style: italic; }

    /* ── Graph canvas ── */
    #network { flex: 1; background: #fafbff; }

    /* ── Legend ── */
    #legend {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(255,255,255,.92); border: 1px solid #dde;
      border-radius: 6px; padding: 10px 14px; font-size: 12px; z-index: 50;
    }
    #legend h3 { margin: 0 0 6px; font-size: 12px; color: #1a2e4a; }
    .leg-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .leg-dot { width: 12px; height: 12px; border-radius: 50%; }

    /* ── Empty state ── */
    #emptyState {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center; color: #aaa; pointer-events: none;
    }
    #emptyState h2 { font-size: 22px; color: #ccc; margin-bottom: 8px; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🔗 Industry Graph Explorer</h1>
  <div id="searchWrap">
    <input id="searchBox" type="text" placeholder="Search by name, code, ATECO or keyword…" autocomplete="off" />
    <div id="results"></div>
  </div>
  <span id="statsLabel" style="font-size:12px;opacity:.7;"></span>
</div>

<div id="filterbar">
  <label>Direction:
    <select id="filterDir">
      <option value="all">All</option>
      <option value="Downstream">Downstream only</option>
      <option value="Upstream">Upstream only</option>
      <option value="Peer">Peer only</option>
    </select>
  </label>
  <label>Min strength:
    <select id="filterStr">
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
      <option value="5">5 only</option>
    </select>
  </label>
  <label>Layout:
    <select id="layoutSel">
      <option value="physics">Force-directed</option>
      <option value="hierarchical">Hierarchical</option>
    </select>
  </label>
  <span id="currentIndustry" style="margin-left:auto;font-weight:bold;color:#a0c4ff;"></span>
</div>

<div id="main">
  <div id="sidebar">
    <h2>Industry Details</h2>
    <div id="infoBox"><em style="color:#aaa">Search for an industry above to begin.</em></div>
  </div>
  <div id="network">
    <div id="emptyState">
      <h2>🏭</h2>
      <p>Search for an industry above<br/>to explore its supply chain connections.</p>
    </div>
  </div>
</div>

<div id="legend">
  <h3>Edge direction</h3>
  <div class="leg-row"><span class="tag dir-downstream">▶</span> Downstream (supplies to)</div>
  <div class="leg-row"><span class="tag dir-upstream">◀</span> Upstream (supplied by)</div>
  <div class="leg-row"><span class="tag dir-peer">↔</span> Peer / adjacent</div>
</div>

<script src="app.js"></script>
</body>
</html>
